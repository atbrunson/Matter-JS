<!doctype html>
<html lang="en">
  <title>Matter Attractors</title>
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimal-ui" />
    <meta name="msapplication-navbutton-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title></title>
    <script src="./libs/matter-0-20-0.js"></script>
    <script src="./libs/matter-tools.min.js"></script>
    <script src="./libs/matter-wrap.js"></script>
    <script src="./libs/bundle.js"></script>
    <script src="./examples/vector_field.js"></script>
    <script src="./examples/magnet.js"></script>
    <script src="./examples/gravity.js"></script>
    <script src="./examples/basic.js"></script>
    <style type="text/css">
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <script>
      var pluginName = "matter-attractors"; // PLUGIN_NAME
      var repoUrl = "https://github.com/liabru/matter-attractors"; // PLUGIN_REPO_URL

      document.title = pluginName + " demo";

      MatterTools.Demo.create({
        preventZoom: false,
        toolbar: {
          title: pluginName,
          url: repoUrl,
          reset: true,
          tools: true,
          source: true,
          fullscreen: true,
          exampleSelect: true,
        },

        tools: {
          inspector: true,
          gui: true,
        },

        examples: [
        {
            name: "Vector Field",
            id: "vector_field",
            init: Example.vector_field,
            sourceLink: repoUrl,
          },  
        {
            name: "Magnet",
            id: "magnet",
            init: Example.magnet,
            sourceLink: repoUrl,
          },
          {
            name: "Gravity",
            id: "gravity",
            init: Example.gravity,
            sourceLink: repoUrl,
          },
          {
            name: "Basic",
            id: "basic",
            init: Example.basic,
            sourceLink: repoUrl,
          },
        ],
      });
    </script>
  </body>
</html>
